{{define "modal"}}
<div class="modal" id="uploadModal">
    <div class="modal-background" onclick="closeUploadModal()"></div>
    <div class="modal-content">
        <div class="box">
            <h3 class="title is-5" id="uploadFileDialogTitle">拖拽文件到下方区域或点击选择文件</h3>
            <form id="uploadForm" method="post" action="/api/file" enctype="multipart/form-data" onsubmit="event.preventDefault(); uploadFile();">
                <input class="mdui-btn mdui-ripple" id="fileInput" type="file" name="file" multiple="" required=""
                       style="display: none" onchange="onFileInputChange()">
                <div class="drop-zone" id="dropZone" 
                     ondrop="dropHandler(event);" 
                     ondragover="dragOverHandler(event);"
                     ondragleave="dragLeaveHandler(event);"
                     onclick="onChooseBtnClicked(event)">
                    <div class="drop-zone-content">
                        <p class="has-text-grey">
                            <span class="icon is-large">
                                <i class="fas fa-cloud-upload-alt fa-2x"></i>
                            </span>
                        </p>
                        <p class="has-text-grey mt-2">拖拽文件到此处</p>
                        <p class="has-text-grey is-size-7">或点击选择文件</p>
                    </div>
                </div>
                <input id='submitBtn' type="submit" name="Upload" style="display: none">
            </form>
            <div class="field is-grouped is-grouped-right mt-4">
                <div class="control">
                    <button class="button is-light" onclick="closeUploadModal()">取消</button>
                </div>
                <div class="control">
                    <button class="button is-info" onclick="uploadFile()" id="uploadBtn" disabled>上传
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="qrcodeModal">
    <div class="modal-background" onclick="closeModal('qrcodeModal')"></div>
    <div class="modal-content box" style="width: 220px; padding: 10px;">
        <canvas id="qrcode" height="200" width="200"></canvas>
    </div>
</div>

<div id="toast"></div>

<div class="modal" id="generalModal">
    <div class="modal-background" onclick="closeModal('generalModal')"></div>
    <div class="modal-content">
        <div class="box">
            <article class="media">
                <div class="media-content">
                    <div class="content">
                        <div class="page-card-title" id="generalModalTitle"></div>
                        <div class="page-card-text" id="generalModalContent">
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </div>
</div>

<div class="modal" id="displayModal">
    <div class="modal-background" onclick="closeModal('displayModal')"></div>
    <div class="modal-content">
        <div class="box">
            <article class="media">
                <div class="media-content">
                    <div class="content">
                        <div class="page-card-title" id="displayModalTitle"></div>
                        <div class="page-card-text center-container" id="displayModalContent">
                        </div>
                    </div>
                </div>
            </article>
        </div>
    </div>
</div>
{{end}}
